name: Daily SEO Dashboard Refresh

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 08:00 Bangkok (UTC+7)
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Fetch data from Supermetrics & rebuild dashboard
        env:
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
          GOOGLE_ADS_ACCOUNT:   ${{ secrets.GOOGLE_ADS_ACCOUNT }}
          FACEBOOK_ADS_ACCOUNT: ${{ secrets.FACEBOOK_ADS_ACCOUNT }}
        run: python scripts/fetch_and_build.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --cached --quiet || git commit -m "Auto-refresh: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
